<style>
  :root {
    --bg: #040412;
    --bg-2: #0a0a1f;
    --card: rgba(255, 255, 255, 0.045);
    --border: rgba(255, 255, 255, 0.085);
    --text: #f0f0ff;
    --muted: rgba(240, 240, 255, 0.45);
    --dim: rgba(240, 240, 255, 0.25);
    --magenta: #ec4899;
    --cyan: #06b6d4;
    --purple: #a855f7;
    --warm-clear: #e0445a;
    --done-grad: linear-gradient(135deg, #06b6d4 0%, #a855f7 50%, #ec4899 100%);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "SF Pro Display", sans-serif;
    -webkit-font-smoothing: antialiased;
    height: 100%;
    overflow: hidden;
  }
  body {
    position: relative;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    min-height: 100svh;
    padding-top: env(safe-area-inset-top);
  }
  /* Subtle starfield + nebula tint */
  body::before {
    content: "";
    position: fixed; inset: 0;
    background:
      radial-gradient(circle at 20% 15%, rgba(168, 85, 247, 0.08) 0%, transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(6, 182, 212, 0.06) 0%, transparent 40%),
      radial-gradient(2px 2px at 15% 25%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1.5px 1.5px at 70% 12%, rgba(255,255,255,0.35), transparent),
      radial-gradient(1.5px 1.5px at 88% 45%, rgba(255,255,255,0.3), transparent),
      radial-gradient(2px 2px at 10% 78%, rgba(255,255,255,0.35), transparent),
      radial-gradient(1.5px 1.5px at 55% 90%, rgba(255,255,255,0.25), transparent),
      radial-gradient(1px 1px at 40% 50%, rgba(255,255,255,0.2), transparent);
    pointer-events: none;
    z-index: 0;
  }

  header, main, form { position: relative; z-index: 1; }

  /* Header */
  header {
    text-align: center;
    padding: 24px 20px 14px;
    flex-shrink: 0;
  }
  .title {
    font-size: 32px;
    font-weight: 900;
    letter-spacing: 0.22em;
    background: linear-gradient(120deg, #ec4899 0%, #a855f7 30%, #06b6d4 65%, #f0f0ff 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    background-size: 220% auto;
    animation: shimmer 7s linear infinite;
    text-indent: 0.22em;
  }
  @keyframes shimmer {
    0%   { background-position: 0% 50%; }
    100% { background-position: 220% 50%; }
  }
  .tagline {
    color: var(--muted);
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-top: 10px;
    font-weight: 600;
    line-height: 1.6;
  }
  .tagline .sep { color: rgba(168, 85, 247, 0.6); margin: 0 6px; }

  /* Main scroll area */
  main {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 8px 0 20px;
  }
  ul {
    list-style: none;
    padding: 0 16px;
  }

  /* Task wrapper */
  .task {
    position: relative;
    margin-bottom: 10px;
    border-radius: 16px;
    overflow: hidden;
    background: var(--bg-2);
  }

  /* Background revealed during swipe */
  .task .swipe-bg {
    position: absolute; inset: 0;
    display: flex;
    align-items: center;
    padding: 0 24px;
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    opacity: 0;
    transition: opacity .1s;
    color: white;
    pointer-events: none;
  }
  .task .swipe-bg.right {
    background: var(--done-grad);
    justify-content: flex-start;
  }
  .task .swipe-bg.left {
    background: linear-gradient(90deg, rgba(224, 68, 90, 0) 0%, rgba(224, 68, 90, 0.85) 60%, rgba(192, 38, 64, 1) 100%);
    justify-content: flex-end;
  }

  /* The card itself */
  .task .card {
    position: relative;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px 20px;
    min-height: 62px;
    display: flex;
    align-items: center;
    transition: transform .25s cubic-bezier(.22, 1, .36, 1);
    touch-action: pan-y;
    user-select: none;
    -webkit-user-select: none;
    cursor: pointer;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }
  .task .card.swiping { transition: none; }

  .task .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--magenta);
    margin-right: 14px;
    flex-shrink: 0;
    transition: all .25s;
    box-shadow: 0 0 10px rgba(236, 72, 153, 0.6);
  }
  .task.done .dot {
    background: var(--cyan);
    box-shadow: 0 0 12px rgba(6, 182, 212, 0.7);
  }

  .task .text {
    flex: 1;
    font-size: 17px;
    line-height: 1.35;
    color: var(--text);
    word-break: break-word;
  }
  .task.done .card {
    background: linear-gradient(135deg, rgba(6, 182, 212, 0.10), rgba(168, 85, 247, 0.06), rgba(236, 72, 153, 0.08));
    border-color: rgba(236, 72, 153, 0.22);
  }
  .task.done .text {
    color: var(--muted);
    text-decoration: line-through;
    text-decoration-color: rgba(236, 72, 153, 0.6);
    text-decoration-thickness: 1.5px;
  }

  .task .edit-input {
    flex: 1;
    background: transparent;
    border: 0;
    border-bottom: 1.5px solid var(--cyan);
    color: var(--text);
    font-size: 17px;
    font-family: inherit;
    padding: 4px 0;
    outline: none;
    width: 100%;
  }

  /* Burst when toggled done */
  @keyframes burst {
    0%   { box-shadow: 0 0 0 0 rgba(236, 72, 153, 0.5); }
    100% { box-shadow: 0 0 0 40px rgba(236, 72, 153, 0); }
  }
  .task.burst .card { animation: burst .6s ease-out; }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 70px 32px;
    color: var(--dim);
  }
  .empty .core {
    width: 80px; height: 80px;
    margin: 0 auto 22px;
    background:
      radial-gradient(circle, rgba(255, 255, 255, 0.6) 0%, rgba(236, 72, 153, 0.3) 35%, rgba(6, 182, 212, 0.15) 65%, transparent 80%);
    border-radius: 50%;
    animation: pulse 3s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.6; }
    50%      { transform: scale(1.18); opacity: 1; }
  }
  .empty p:first-of-type {
    font-size: 15px;
    color: var(--text);
    letter-spacing: 0.02em;
  }
  .empty p + p {
    margin-top: 8px;
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* Add form */
  form {
    flex-shrink: 0;
    padding: 12px 16px max(16px, env(safe-area-inset-bottom));
    background: linear-gradient(0deg, var(--bg) 50%, rgba(4, 4, 18, 0));
    display: flex;
    gap: 10px;
  }
  input[type="text"] {
    flex: 1;
    min-width: 0;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px 18px;
    color: var(--text);
    font-size: 16px;
    outline: none;
    transition: border-color .15s;
    font-family: inherit;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }
  input[type="text"]:focus { border-color: rgba(236, 72, 153, 0.5); }
  input[type="text"]::placeholder { color: var(--dim); }

  form button {
    background: var(--done-grad);
    background-size: 220% 220%;
    background-position: 0% 50%;
    color: white;
    border: 0;
    border-radius: 16px;
    padding: 0 22px;
    font-size: 26px;
    font-weight: 300;
    line-height: 1;
    cursor: pointer;
    transition: background-position .3s, transform .1s;
    font-family: inherit;
    box-shadow: 0 4px 20px rgba(168, 85, 247, 0.3);
  }
  form button:active { transform: scale(0.94); background-position: 100% 50%; }

  /* Undo toast */
  .toast {
    position: fixed;
    bottom: calc(82px + env(safe-area-inset-bottom));
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(20, 18, 40, 0.95);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(236, 72, 153, 0.3);
    border-radius: 999px;
    padding: 10px 18px;
    font-size: 13px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 14px;
    opacity: 0;
    transition: opacity .25s, transform .25s;
    pointer-events: none;
    z-index: 100;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
    pointer-events: auto;
  }
  .toast button {
    background: transparent;
    border: 1px solid rgba(236, 72, 153, 0.7);
    color: var(--magenta);
    border-radius: 999px;
    padding: 5px 14px;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    font-family: inherit;
  }

  /* Slide-out delete animation */
  .task.removing {
    animation: slideOut .3s ease-in forwards;
    pointer-events: none;
  }
  @keyframes slideOut {
    0%   { transform: translateX(0); opacity: 1; max-height: 100px; margin-bottom: 10px; }
    100% { transform: translateX(-120%); opacity: 0; max-height: 0; margin-bottom: 0; }
  }

  /* Slide-in for new tasks */
  .task.adding { animation: slideIn .25s ease-out; }
  @keyframes slideIn {
    0%   { transform: translateY(-8px); opacity: 0; }
    100% { transform: none; opacity: 1; }
  }
</style>
</head>
<body>
  <header>
    <div class="title">SUPERNOVA</div>
    <div class="tagline">
      swipe right <span class="sep">·</span> done
      <span class="sep">·</span>
      swipe left <span class="sep">·</span> clear
      <span class="sep">·</span>
      double tap <span class="sep">·</span> edit
    </div>
  </header>

  <main>
    <ul id="list"></ul>
    <div class="empty" id="empty" style="display: none;">
      <div class="core"></div>
      <p>No tasks orbiting.</p>
      <p>Add one below to ignite.</p>
    </div>
  </main>

  <form id="addForm" autocomplete="off">
    <input type="text" id="addInput" placeholder="New task…" maxlength="200" />
    <button type="submit" aria-label="Add task">+</button>
  </form>

  <div class="toast" id="toast" role="status" aria-live="polite">
    <span id="toastMsg">Task cleared</span>
    <button type="button" id="undoBtn">Undo</button>
  </div>

<script>
"use strict";

const STORAGE_KEY = "supernova.v1";

let tasks = load();
let lastDeleted = null;
let undoTimer = null;
let editingId = null;
let lastTap = { id: null, time: 0 };

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return [];
    const parsed = JSON.parse(raw);
    if (!Array.isArray(parsed)) return [];
    return parsed.filter(t => t && t.id && typeof t.text === "string");
  } catch (e) { return []; }
}
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); } catch (e) {}
}
function uid() { return "t_" + Math.random().toString(36).slice(2, 10); }

function render(opts) {
  const ul = document.getElementById("list");
  ul.innerHTML = "";
  const empty = document.getElementById("empty");
  empty.style.display = tasks.length === 0 ? "block" : "none";

  for (const task of tasks) {
    const li = document.createElement("li");
    li.className = "task" + (task.done ? " done" : "");
    if (opts && opts.justAddedId === task.id) li.classList.add("adding");
    if (opts && opts.burstId === task.id) li.classList.add("burst");
    li.dataset.id = task.id;

    const swipeBg = document.createElement("div");
    swipeBg.className = "swipe-bg";
    li.appendChild(swipeBg);

    const card = document.createElement("div");
    card.className = "card";

    const dot = document.createElement("span");
    dot.className = "dot";
    card.appendChild(dot);

    if (editingId === task.id) {
      const input = document.createElement("input");
      input.type = "text";
      input.className = "edit-input";
      input.value = task.text;
      input.maxLength = 200;
      card.appendChild(input);
      requestAnimationFrame(() => {
        input.focus();
        input.setSelectionRange(input.value.length, input.value.length);
      });
      let committed = false;
      const finish = (commit) => {
        if (committed) return;
        committed = true;
        const newText = input.value.trim();
        editingId = null;
        if (commit && newText) {
          task.text = newText;
          save();
        }
        render();
      };
      input.addEventListener("blur", () => finish(true));
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") { e.preventDefault(); finish(true); }
        if (e.key === "Escape") { committed = true; editingId = null; render(); }
      });
    } else {
      const text = document.createElement("span");
      text.className = "text";
      text.textContent = task.text;
      card.appendChild(text);
      attachGestures(li, card, task);
    }

    li.appendChild(card);
    ul.appendChild(li);
  }
}

function attachGestures(li, card, task) {
  let startX = null, startY = null;
  let dx = 0;
  let mode = null;
  const swipeBg = li.querySelector(".swipe-bg");
  const thresholdRatio = 0.32;

  const start = (clientX, clientY) => {
    startX = clientX; startY = clientY;
    dx = 0; mode = null;
    card.classList.add("swiping");
  };
  const move = (clientX, clientY, e) => {
    if (startX === null) return;
    const moveX = clientX - startX;
    const moveY = clientY - startY;
    if (!mode) {
      if (Math.abs(moveX) > 8 && Math.abs(moveX) > Math.abs(moveY) + 4) {
        mode = "swipe";
      } else if (Math.abs(moveY) > 10) {
        mode = "scroll";
        card.classList.remove("swiping");
        return;
      }
    }
    if (mode === "swipe") {
      if (e && e.cancelable) e.preventDefault();
      dx = moveX;
      card.style.transform = `translateX(${moveX}px)`;
      if (moveX > 0) {
        swipeBg.className = "swipe-bg right";
        swipeBg.textContent = "✓  DONE";
      } else {
        swipeBg.className = "swipe-bg left";
        swipeBg.textContent = "CLEAR  ✕";
      }
      const cardWidth = card.offsetWidth;
      const progress = Math.min(Math.abs(moveX) / (cardWidth * thresholdRatio), 1);
      swipeBg.style.opacity = String(progress);
    }
  };
  const end = () => {
    card.classList.remove("swiping");
    if (startX === null) return;
    const cardWidth = card.offsetWidth;
    const committed = mode;
    const finalDx = dx;
    startX = null; startY = null; dx = 0; mode = null;

    if (committed === "swipe") {
      if (finalDx > cardWidth * thresholdRatio) {
        // Mark done
        card.style.transform = `translateX(${cardWidth}px)`;
        setTimeout(() => {
          task.done = !task.done;
          save();
          render({ burstId: task.id });
        }, 180);
      } else if (finalDx < -cardWidth * thresholdRatio) {
        // Delete with undo
        li.classList.add("removing");
        setTimeout(() => deleteTask(task.id), 280);
      } else {
        card.style.transform = "translateX(0)";
        swipeBg.style.opacity = "0";
      }
    } else if (committed === null) {
      // Was a tap → check double-tap
      const now = Date.now();
      if (lastTap.id === task.id && (now - lastTap.time) < 350) {
        editingId = task.id;
        lastTap = { id: null, time: 0 };
        render();
      } else {
        lastTap = { id: task.id, time: now };
      }
    }
  };

  card.addEventListener("touchstart", (e) => {
    const t = e.touches[0];
    start(t.clientX, t.clientY);
  }, { passive: true });
  card.addEventListener("touchmove", (e) => {
    const t = e.touches[0];
    move(t.clientX, t.clientY, e);
  }, { passive: false });
  card.addEventListener("touchend", end);
  card.addEventListener("touchcancel", () => {
    card.classList.remove("swiping");
    card.style.transform = "translateX(0)";
    swipeBg.style.opacity = "0";
    startX = null; startY = null; dx = 0; mode = null;
  });

  // Mouse fallback for desktop testing
  let mouseDown = false;
  card.addEventListener("mousedown", (e) => { mouseDown = true; start(e.clientX, e.clientY); });
  card.addEventListener("mousemove", (e) => { if (mouseDown) move(e.clientX, e.clientY, null); });
  const upHandler = () => { if (mouseDown) { end(); mouseDown = false; } };
  card.addEventListener("mouseup", upHandler);
  card.addEventListener("mouseleave", upHandler);

  // Desktop double-click → edit
  card.addEventListener("dblclick", (e) => {
    e.preventDefault();
    editingId = task.id;
    render();
  });
}

function deleteTask(id) {
  const idx = tasks.findIndex(t => t.id === id);
  if (idx < 0) return;
  lastDeleted = { task: tasks[idx], index: idx };
  tasks.splice(idx, 1);
  save();
  render();
  showUndo();
}
function showUndo() {
  const toast = document.getElementById("toast");
  toast.classList.add("show");
  clearTimeout(undoTimer);
  undoTimer = setTimeout(() => {
    toast.classList.remove("show");
    lastDeleted = null;
  }, 4500);
}
document.getElementById("undoBtn").addEventListener("click", () => {
  if (!lastDeleted) return;
  tasks.splice(Math.min(lastDeleted.index, tasks.length), 0, lastDeleted.task);
  lastDeleted = null;
  save();
  render();
  document.getElementById("toast").classList.remove("show");
  clearTimeout(undoTimer);
});

document.getElementById("addForm").addEventListener("submit", (e) => {
  e.preventDefault();
  const input = document.getElementById("addInput");
  const text = input.value.trim();
  if (!text) return;
  const id = uid();
  tasks.push({ id, text, done: false });
  input.value = "";
  save();
  render({ justAddedId: id });
});

// Seed a couple of demo tasks on first run so the UI doesn't feel empty
if (tasks.length === 0 && !localStorage.getItem(STORAGE_KEY + ".seeded")) {
  tasks = [
    { id: uid(), text: "Swipe right to mark me done", done: false },
    { id: uid(), text: "Swipe left to clear a task", done: false },
    { id: uid(), text: "Double tap to edit", done: false },
  ];
  save();
  localStorage.setItem(STORAGE_KEY + ".seeded", "1");
}

render();
</script>
</body>
</html>
